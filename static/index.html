<!DOCTYPE html>
<html>
<head>
    <title>Mapa Ambiental Campinas</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body { margin: 0; }
        #map { height: 100vh; }

        .legend {
            background: white;
            padding: 10px;
            border-radius: 8px;
        }

        .legend span {
            display: inline-block;
            width: 12px;
            height: 12px;
            margin-right: 6px;
        }

        .controls {
            position: absolute;
            top: 10px;
            right: 10px;
            background: white;
            padding: 10px;
            z-index: 1000;
            border-radius: 8px;
        }
    </style>
</head>
<body>

<div id="map"></div>

<div class="controls">
    <button onclick="exportLayer()">Exportar GeoTIFF</button>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([-22.9, -47.06], 11);

// ---------------------------
// BASEMAPS
// ---------------------------
const basemaps = {
    "OSM": L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'),
    "Satélite": L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
};

basemaps["OSM"].addTo(map);

// ---------------------------
// LAYERS
// ---------------------------
const layersConfig = {
    "Hidrografia": {asset: "projects/ee-pigee/assets/hidrografia_campinas", color: "031fbb"},
    "Nascentes": {asset: "projects/ee-pigee/assets/nascentes_campinas", color: "13f2f9", point: true}
};

let overlays = {};

async function loadLayer(name, config) {
    const res = await fetch(`/tile?asset_id=${config.asset}&palette=${config.color}&is_point=${config.point || false}`);
    const data = await res.json();

    const layer = L.tileLayer(data.url);
    overlays[name] = layer;
    layer.addTo(map);
}

for (const [name, config] of Object.entries(layersConfig)) {
    loadLayer(name, config);
}

L.control.layers(basemaps, overlays).addTo(map);

// ---------------------------
// LEGEND
// ---------------------------
const legend = L.control({position: "bottomleft"});

legend.onAdd = function () {
    const div = L.DomUtil.create("div", "legend");

    div.innerHTML = "<b>Legenda</b><br>";
    for (const [name, config] of Object.entries(layersConfig)) {
        div.innerHTML += `<div><span style="background:#${config.color}"></span>${name}</div>`;
    }

    return div;
};

legend.addTo(map);

// ---------------------------
// EXPORT
// ---------------------------
function exportLayer() {
    const asset = "projects/ee-pigee/assets/hidrografia_campinas";

    fetch(`/export?asset_id=${asset}`)
        .then(res => res.json())
        .then(data => {
            window.open(data.download_url, "_blank");
        });
}
</script>

</body>
</html>
