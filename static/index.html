<!DOCTYPE html>
<html>
<head>
    <title>Mapa Ambiental Campinas</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body { margin: 0; }
        #map { height: 100vh; }

        .panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: white;
            padding: 10px;
            z-index: 1000;
            border-radius: 8px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .legend {
            background: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }

        .legend span {
            display: inline-block;
            width: 12px;
            height: 12px;
            margin-right: 6px;
        }
    </style>
</head>
<body>

<div id="map"></div>

<!-- PAINEL -->
<div class="panel">
    <b>Camadas</b><br>
    <div id="layer-controls"></div>
</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([-22.9, -47.06], 11);

// ---------------------------
// BASEMAPS
// ---------------------------
const basemaps = {
    "OSM": L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'),
    "Satélite": L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}')
};

basemaps["OSM"].addTo(map);

// ---------------------------
// CAMADAS
// ---------------------------
const layersConfig = {
    "Limite": {asset: "projects/ee-rogergodoytest/assets/limite_municipal", color: "000000"},
    "APA": {asset: "projects/ee-pigee/assets/UnidadesConservacaoCampinas", color: "3AF40B"},
    "APP": {asset: "projects/ee-pigee/assets/areaPreservacaoPermanente", color: "f1fc07"},
    "Amortecimento": {asset: "projects/ee-pigee/assets/zonasAmortecimento", color: "f50618"},
    "Nascentes": {asset: "projects/ee-pigee/assets/nascentes_campinas", color: "13f2f9", point: true},
    "Hidrografia": {asset: "projects/ee-pigee/assets/hidrografia_campinas", color: "031fbb"},
    "HIDS": {asset: "projects/ee-pigee/assets/hids", color: "fa9e09"},
    "PIDS": {asset: "projects/ee-pigee/assets/hids_pids", color: "d488de"}
};

let overlays = {};

// ---------------------------
// CARREGAR CAMADAS
// ---------------------------
async function createLayer(name, config) {
    const res = await fetch(`/tile?asset_id=${config.asset}&palette=${config.color}&is_point=${config.point || false}`);
    const data = await res.json();

    if (data.url) {
        overlays[name] = L.tileLayer(data.url);
    }
}

// inicializa todas
async function initLayers() {
    for (const [name, config] of Object.entries(layersConfig)) {
        await createLayer(name, config);
    }

    createLayerControls();
}

initLayers();

// ---------------------------
// CHECKBOX UI
// ---------------------------
function createLayerControls() {
    const container = document.getElementById("layer-controls");

    for (const name in overlays) {
        const div = document.createElement("div");

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = true;

        checkbox.onchange = function() {
            if (this.checked) {
                overlays[name].addTo(map);
            } else {
                map.removeLayer(overlays[name]);
            }
        };

        // adiciona por padrão
        overlays[name].addTo(map);

        const label = document.createElement("label");
        label.innerHTML = `<span style="background:#${layersConfig[name].color}; width:10px; height:10px; display:inline-block;"></span> ${name}`;

        div.appendChild(checkbox);
        div.appendChild(label);

        container.appendChild(div);
    }
}

// ---------------------------
// LEGENDA
// ---------------------------
const legend = L.control({position: "bottomleft"});

legend.onAdd = function () {
    const div = L.DomUtil.create("div", "legend");

    div.innerHTML = "<b>Legenda</b><br>";

    for (const [name, config] of Object.entries(layersConfig)) {
        div.innerHTML += `<div><span style="background:#${config.color}"></span>${name}</div>`;
    }

    return div;
};

legend.addTo(map);

// ---------------------------
// CLICK NO MAPA → INFO
// ---------------------------
map.on('click', function(e) {
    const lat = e.latlng.lat.toFixed(6);
    const lng = e.latlng.lng.toFixed(6);

    L.popup()
        .setLatLng(e.latlng)
        .setContent(`<b>Coordenadas</b><br>Lat: ${lat}<br>Lon: ${lng}`)
        .openOn(map);
});
</script>

</body>
</html>
