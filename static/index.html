<!DOCTYPE html>
<html>
<head>
    <title>Mapa Ambiental Campinas</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

    <style>
        body { margin: 0; }
        #map { height: 100vh; }

        .legend {
            background: white;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
        }

        .legend span {
            display: inline-block;
            width: 12px;
            height: 12px;
            margin-right: 6px;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([-22.9, -47.06], 11);

// ---------------------------
// BASEMAPS (TODOS)
// ---------------------------
const basemaps = {
    "OpenStreetMap": L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png'),
    "Satélite (Esri)": L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}'),
    "CartoDB Positron": L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png'),
    "CartoDB Dark": L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png')
};

basemaps["OpenStreetMap"].addTo(map);

// ---------------------------
// TODAS AS CAMADAS (PORTADAS)
// ---------------------------
const layersConfig = {
    "Limite": {asset: "projects/ee-rogergodoytest/assets/limite_municipal", color: "000000"},
    "APA": {asset: "projects/ee-pigee/assets/UnidadesConservacaoCampinas", color: "3AF40B"},
    "APP": {asset: "projects/ee-pigee/assets/areaPreservacaoPermanente", color: "f1fc07"},
    "Amortecimento": {asset: "projects/ee-pigee/assets/zonasAmortecimento", color: "f50618"},
    "Nascentes": {asset: "projects/ee-pigee/assets/nascentes_campinas", color: "13f2f9", point: true},
    "Hidrografia": {asset: "projects/ee-pigee/assets/hidrografia_campinas", color: "031fbb"},
    "HIDS": {asset: "projects/ee-pigee/assets/hids", color: "fa9e09"},
    "PIDS": {asset: "projects/ee-pigee/assets/hids_pids", color: "d488de"}
};

let overlays = {};

// ---------------------------
// CARREGAR CAMADAS
// ---------------------------
async function loadLayer(name, config) {
    const res = await fetch(`/tile?asset_id=${config.asset}&palette=${config.color}&is_point=${config.point || false}`);
    const data = await res.json();

    if (data.url) {
        const layer = L.tileLayer(data.url);
        overlays[name] = layer;
        layer.addTo(map);
    }
}

// carregar todas
for (const [name, config] of Object.entries(layersConfig)) {
    loadLayer(name, config);
}

// ---------------------------
// CONTROLE
// ---------------------------
L.control.layers(basemaps, overlays).addTo(map);

// ---------------------------
// LEGENDA DINÂMICA
// ---------------------------
const legend = L.control({position: "bottomleft"});

legend.onAdd = function () {
    const div = L.DomUtil.create("div", "legend");

    div.innerHTML = "<b>Legenda</b><br>";

    for (const [name, config] of Object.entries(layersConfig)) {
        div.innerHTML += `<div><span style="background:#${config.color}"></span>${name}</div>`;
    }

    return div;
};

legend.addTo(map);
</script>

</body>
</html>
